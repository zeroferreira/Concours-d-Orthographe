    // Agregar este nuevo estado

    // Estados para el sistema de Ayuda y Reportes (Hilfe und Berichte)
    const [showHelpMenu, setShowHelpMenu] = useState(false);
    const [helpModalType, setHelpModalType] = useState(null); // 'report' o 'suggestion'
    const [helpDocked, setHelpDocked] = useState(false);
    const [reports, setReports] = useState(() => JSON.parse(localStorage.getItem('bee_de_reports') || '[]'));
    const [suggestions, setSuggestions] = useState(() => JSON.parse(localStorage.getItem('bee_de_suggestions') || '[]'));
    
    const [reportForm, setReportForm] = useState({ category: '', part: '', description: '' });
    const [suggestionForm, setSuggestionForm] = useState({ description: '' });

    // Guardar en localStorage cuando cambien los datos
    useEffect(() => {
      localStorage.setItem('bee_de_reports', JSON.stringify(reports));
    }, [reports]);

    useEffect(() => {
      localStorage.setItem('bee_de_suggestions', JSON.stringify(suggestions));
    }, [suggestions]);

    // Cargar voces disponibles (ingl√©s para las palabras)
    useEffect(() => {
      const loadVoices = () => {
        const voices = speechSynthesis.getVoices().filter(voice => 
          voice.lang.startsWith('en') || voice.lang.startsWith('de')
        );
        // Priorizar voces en ingl√©s para las palabras
        const sortedVoices = voices.sort((a, b) => {
          if (a.lang.startsWith('en') && !b.lang.startsWith('en')) return -1;
          if (!a.lang.startsWith('en') && b.lang.startsWith('en')) return 1;
          return 0;
        });
        setAvailableVoices(sortedVoices);
        if (sortedVoices.length > 0 && !selectedVoice) {
          // Seleccionar la primera voz en ingl√©s por defecto
          const englishVoice = sortedVoices.find(v => v.lang.startsWith('en'));
          setSelectedVoice(englishVoice || sortedVoices[0]);
        }
      };
      
      loadVoices();
      speechSynthesis.onvoiceschanged = loadVoices;
    }, []);

    // Funci√≥n de reconocimiento con procesamiento inmediato
    const initSpeechRecognition = () => {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Reconocimiento de voz no soportado. Usa Chrome o Edge.');
        return null;
      }
      
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognitionInstance = new SpeechRecognition();
      
      // Configuraci√≥n para reconocimiento inmediato
      recognitionInstance.continuous = true;
      recognitionInstance.interimResults = true; // CLAVE: Permite resultados intermedios
      recognitionInstance.lang = (window.SPELLING_DATA && window.SPELLING_DATA.language) ? window.SPELLING_DATA.language : 'de-DE';
      recognitionInstance.maxAlternatives = 1;
      
      // Intentar configuraci√≥n offline (no garantizada pero ayuda)
      try {
        recognitionInstance.serviceURI = '';
      } catch (e) {
        // Ignorar si no es compatible
      }
      
      let isManualStop = false;
      let lastProcessedLength = 0; // Para evitar procesar el mismo texto m√ļltiples veces
      
      recognitionInstance.onstart = () => {
        console.log('ūüé§ Reconocimiento INICIADO');
        setIsListening(true);
        setRecognitionReady(true);
        isManualStop = false;
        lastProcessedLength = 0;
      };
      
      recognitionInstance.onresult = (event) => {
        const results = event.results;
        const lastIdx = results.length - 1;
        if (lastIdx < 0) return;
        const res = results[lastIdx];
        if (!res || !res[0]) return;

        if (!res.isFinal) return;
        const transcript = (res[0].transcript || '').trim();
        const result = processSpokenInput(transcript);

        if (result === 'DELETE') {
          setSpokenText(prev => prev.slice(0, -1));
        } else if (result === 'CLEAR') {
          setSpokenText('');
        } else if (result) {
          setSpokenText(prev => prev + result);
        }

        lastProcessedLength = 0;
      };
      
      recognitionInstance.onerror = (event) => {
        console.error('‚ĚĆ Error de reconocimiento:', event.error);
        
        switch(event.error) {
          case 'network':
            console.log('ūüĆź Error de red - usando modo offline');
            // En lugar de fallar, continuar sin conexi√≥n
            if (shouldKeepListening && !isManualStop) {
              setTimeout(() => {
                try {
                  recognitionInstance.start();
                } catch (error) {
                  console.log('Error al reiniciar despu√©s de error de red:', error);
                }
              }, 1000);
            }
            break;
            
          case 'not-allowed':
            alert('Acceso al micr√≥fono denegado.\n\n1. Haz clic en el candado del navegador (barra de direcciones)\n2. Permite Micr√≥fono\n3. Recarga la p√°gina\n\nEn m√≥vil: revisa Permisos del navegador/app.');
            setShouldKeepListening(false);
            setIsListening(false);
            break;
            
          case 'no-speech':
            console.log('‚ö†ÔłŹ No se detect√≥ voz - continuando...');
            // No reiniciar para no-speech en modo continuo
            break;
            
          case 'audio-capture':
            alert('Error de micr√≥fono. Verifica que est√© conectado y funcionando.');
            setShouldKeepListening(false);
            setIsListening(false);
            break;
            
          case 'aborted':
            console.log('ūüõĎ Reconocimiento abortado');
            if (shouldKeepListening && !isManualStop) {
              setTimeout(() => {
                try {
                  recognitionInstance.start();
                } catch (error) {
                  console.log('Error al reiniciar despu√©s de abort:', error);
                }
              }, 500);
            }
            break;
            
          default:
            console.log('‚Ěď Error desconocido:', event.error, '- reintentando...');
            if (shouldKeepListening && !isManualStop) {
              setTimeout(() => {
                try {
                  recognitionInstance.start();
                } catch (error) {
                  console.log('Error al reiniciar despu√©s de error desconocido:', error);
                }
              }, 1500);
            }
        }
      };
      
      recognitionInstance.onend = () => {
        console.log('ūüĒö Reconocimiento terminado');
        
        if (shouldKeepListening && !isManualStop) {
          console.log('ūüĒĄ Reiniciando autom√°ticamente...');
          setTimeout(() => {
            try {
              recognitionInstance.start();
              lastProcessedLength = 0; // Resetear contador
            } catch (error) {
              console.log('Error en reinicio autom√°tico:', error);
            }
          }, 300);
        } else {
          setIsListening(false);
          setRecognitionReady(false);
          lastProcessedLength = 0;
        }
      };
      
      // Funci√≥n para detener manualmente
      recognitionInstance.manualStop = () => {
        isManualStop = true;
        setShouldKeepListening(false);
        lastProcessedLength = 0;
        try {
          recognitionInstance.stop();
        } catch (error) {
          console.error('Error al detener manualmente:', error);
        }
      };
      
      return recognitionInstance;
    };

    // Cleanup al desmontar el componente
    useEffect(() => {
      return () => {
        if (recognition) {
          setShouldKeepListening(false);
          try {
            recognition.stop();
          } catch (error) {
            console.error('Error en cleanup:', error);
          }
        }
      };
    }, [recognition]);

    // Funci√≥n de toggle actualizada
    const toggleListening = async () => {
      console.log('ūüĒė Toggle - Estado actual:', isListening);
      
      if (!recognition) {
        try {
          // Solicitar permisos
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            setShouldKeepListening(true);
            
            setTimeout(() => {
              try {
                newRecognition.start();
              } catch (error) {
                console.error('Error al iniciar:', error);
              }

          }

          console.error('Error de permisos:', error);

        return;

      } else {
        console.log('‚Ė∂ÔłŹ INICIANDO reconocimiento...');

              }, 500);
            } catch (e) {
              console.error('Error en reinicio forzado:', e);
            }
          }
        }
      }
    };
